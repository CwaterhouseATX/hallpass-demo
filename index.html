<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hall Pass — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   TOKENS — "Classroom dispatch board"
   green = go/available · amber = wait · red = attention
   warm kiosk  ·  cool console
   ============================================================ */
:root{
  --ink:#1B2330;
  --ink-soft:#48566b;
  --ink-faint:#8794a6;
  --paper:#EEF1F4;
  --surface:#FFFFFF;
  --surface-2:#E5EAF0;
  --line:#D5DCE5;

  --go:#1F8A5B;        --go-ink:#0d5e3a;   --go-wash:#e2f3ea;
  --wait:#D98A1F;      --wait-ink:#8a5410;  --wait-wash:#fbefdb;
  --signal:#E1554A;    --signal-ink:#9c2c24; --signal-wash:#fbe4e2;
  --console:#28406B;   --console-ink:#1a2c4d; --console-wash:#e6ebf4;

  --r-sm:8px; --r:14px; --r-lg:22px; --r-xl:30px;
  --shadow:0 1px 2px rgba(27,35,48,.06), 0 8px 24px -12px rgba(27,35,48,.22);
  --shadow-lg:0 24px 60px -24px rgba(27,35,48,.40);
  --font-display:"Bricolage Grotesque",system-ui,sans-serif;
  --font-ui:"Hanken Grotesk",system-ui,sans-serif;
  --font-mono:"Spline Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-ui);
  color:var(--ink);
  background:var(--paper);
  -webkit-font-smoothing:antialiased;
  line-height:1.45;
  overflow:hidden; /* overridden per-mode below */
}
body.console-mode{ overflow:auto; }
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--ink)}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.app{display:flex;flex-direction:column;min-height:100dvh}
.app.kiosk-mode{height:100dvh;overflow:hidden}
.app.console-mode{min-height:100dvh}

/* ============================================================ DEMO BANNER */
.demobar{
  flex:0 0 auto;display:flex;align-items:center;gap:12px;
  padding:7px 16px;background:var(--ink);color:#fff;font-size:.78rem;font-weight:500;
  letter-spacing:.01em;
}
.demobar b{font-weight:700}
.demobar .spacer{flex:1}
.demobar button{
  color:#fff;border:1px solid rgba(255,255,255,.28);border-radius:999px;
  padding:4px 12px;font-size:.74rem;font-weight:600;transition:background .15s;
}
.demobar button:hover{background:rgba(255,255,255,.12)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--go);display:inline-block;box-shadow:0 0 0 3px var(--go-wash)}

/* ============================================================ KIOSK */
.kiosk{
  flex:1;min-height:0;position:relative;overflow:hidden;height:100%;
  background:
    radial-gradient(120% 90% at 50% -10%, #ffffff 0%, var(--paper) 55%),
    var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.kiosk-rail{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px);
  background-size:100% 64px;opacity:.35;mask-image:linear-gradient(transparent,#000 30%,#000 70%,transparent)}
.kiosk-head{text-align:center;margin-bottom:22px;z-index:1}
.kiosk-eyebrow{font-size:.82rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.kiosk-title{font-family:var(--font-display);font-weight:800;font-size:clamp(2rem,4.5vw,3.4rem);letter-spacing:-.02em;line-height:1.02;margin-top:4px}
.kiosk-sub{color:var(--ink-soft);font-size:1.05rem;margin-top:6px}

.kiosk-card{
  z-index:1;width:min(560px,94vw);background:var(--surface);border-radius:var(--r-xl);
  box-shadow:var(--shadow-lg);border:1px solid var(--line);
  padding:26px 26px 30px;
}
.numscreen{
  background:var(--ink);color:#fff;border-radius:var(--r-lg);
  padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.numscreen .label{font-size:.78rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#9fb0c9}
.numscreen .value{font-family:var(--font-mono);font-weight:700;font-size:clamp(2.2rem,8vw,3.2rem);letter-spacing:.06em;min-height:1.1em}
.numscreen .value.placeholder{color:#5a6b86}

.dests{display:flex;gap:10px;margin:18px 0 16px}
.chip{
  flex:1;border:1.5px solid var(--line);border-radius:var(--r);background:var(--surface);
  padding:13px 8px;text-align:center;font-weight:600;font-size:.98rem;color:var(--ink-soft);
  transition:all .14s;
}
.chip .ic{font-size:1.3rem;display:block;margin-bottom:2px}
.chip[aria-pressed="true"]{border-color:var(--go);background:var(--go-wash);color:var(--go-ink)}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{
  background:var(--surface-2);border-radius:var(--r);padding:18px 0;font-size:1.7rem;font-weight:600;
  font-family:var(--font-mono);color:var(--ink);transition:transform .06s, background .14s;
}
.key:active{transform:scale(.95);background:#d3dbe6}
.key.util{font-size:1.1rem;font-weight:700;font-family:var(--font-ui);color:var(--ink-soft)}
.key.go{background:var(--go);color:#fff;grid-column:span 1}
.key.go:active{background:var(--go-ink)}

.kiosk-foot{z-index:1;margin-top:20px;display:flex;align-items:center;gap:16px;color:var(--ink-faint);font-size:.85rem}
.staff-link{color:var(--ink-faint);font-weight:600;border:1px solid var(--line);border-radius:999px;padding:6px 14px;background:var(--surface)}
.staff-link:hover{color:var(--console);border-color:var(--console)}

/* result overlay */
.result{
  position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(238,241,244,.7);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.result.show{opacity:1;pointer-events:auto}
.result-card{
  background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);
  padding:40px 44px;text-align:center;max-width:520px;width:92vw;border-top:8px solid var(--go);
  transform:translateY(8px) scale(.98);transition:transform .25s;
}
.result.show .result-card{transform:none}
.result-card.wait{border-top-color:var(--wait)}
.result-card .big{font-size:3.4rem;line-height:1;margin-bottom:10px}
.result-card h2{font-family:var(--font-display);font-size:1.9rem;font-weight:800;letter-spacing:-.01em}
.result-card p{color:var(--ink-soft);font-size:1.15rem;margin-top:8px}

/* ============================================================ CONSOLE */
.console{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--paper)}
.topbar{
  flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:12px 20px;
  background:var(--console);color:#fff;
}
.brandmark{font-family:var(--font-display);font-weight:800;font-size:1.15rem;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.brandmark .glyph{width:26px;height:26px;border-radius:8px;background:#fff;color:var(--console);display:grid;place-items:center;font-size:.95rem;font-weight:800}
.topbar .who{margin-left:6px;font-size:.9rem;opacity:.92}
.topbar .who b{font-weight:700}
.topbar .spacer{flex:1}
.topbar .clock{font-family:var(--font-mono);font-weight:600;font-size:.95rem;opacity:.95}
.lockbtn{border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:7px 15px;color:#fff;font-weight:600;font-size:.85rem}
.lockbtn:hover{background:rgba(255,255,255,.14)}

.console-body{flex:1;min-height:0;display:flex}
.nav{
  flex:0 0 210px;background:var(--surface);border-right:1px solid var(--line);padding:14px 12px;
  display:flex;flex-direction:column;gap:3px;overflow:auto;
}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 12px;border-radius:10px;
  color:var(--ink-soft);font-weight:600;font-size:.95rem;transition:background .12s,color .12s;
}
.nav button .ic{width:20px;text-align:center;font-size:1.05rem}
.nav button:hover{background:var(--surface-2)}
.nav button.active{background:var(--console-wash);color:var(--console-ink)}
.nav .navtag{margin-left:auto;background:var(--signal);color:#fff;font-size:.7rem;font-weight:800;
  border-radius:999px;padding:1px 7px;font-family:var(--font-mono)}
.nav .sep{height:1px;background:var(--line);margin:8px 4px}
.nav .navlabel{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);padding:8px 12px 4px}

.view{flex:1;min-height:0;overflow:auto;padding:24px 28px}
@media(max-width:680px){.view{overflow:visible;}}
.view-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:18px}
.view-head h1{font-family:var(--font-display);font-size:1.7rem;font-weight:800;letter-spacing:-.015em}
.view-head .sub{color:var(--ink-soft);font-size:.95rem;padding-bottom:3px}
.view-head .spacer{flex:1}

/* generic UI */
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--console);color:#fff;font-weight:600;
  border-radius:10px;padding:9px 15px;font-size:.92rem;transition:filter .14s,transform .06s}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--surface-2);filter:none}
.btn.go{background:var(--go)}
.btn.danger{background:var(--signal)}
.btn.sm{padding:6px 11px;font-size:.85rem;border-radius:8px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.panel-head{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;font-weight:700}
.panel-head .count{margin-left:auto;font-family:var(--font-mono);font-size:.85rem;color:var(--ink-faint);font-weight:600}
.panel-body{padding:14px 16px}

/* the signature: hall-pass tags on the out board */
.board{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
@media(max-width:980px){.board{grid-template-columns:1fr}}
.pass{
  position:relative;background:var(--surface);border:1px solid var(--line);border-left:6px solid var(--go);
  border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;
}
.pass.s-wait{border-left-color:var(--wait)}
.pass.s-over{border-left-color:var(--signal)}
.pass.s-over::after{content:"";position:absolute;inset:0;border-radius:var(--r);border:1.5px solid var(--signal);
  animation:pulse 1.6s ease-in-out infinite;pointer-events:none}
@keyframes pulse{0%,100%{opacity:.0}50%{opacity:.55}}
.pass .num{font-family:var(--font-mono);font-weight:700;font-size:1.5rem;letter-spacing:.04em}
.pass .meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.pass .meta .d{font-weight:700;font-size:.95rem}
.pass .meta .room{color:var(--ink-faint);font-size:.82rem}
.pass .timer{margin-left:auto;text-align:right}
.pass .timer .t{font-family:var(--font-mono);font-weight:700;font-size:1.35rem}
.pass .timer .lbl{font-size:.72rem;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.pass.s-wait .timer .t{color:var(--wait-ink)}
.pass.s-over .timer .t{color:var(--signal-ink)}
.pass .ret{margin-left:8px}

.statuslight{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.statuslight.go{background:var(--go);box-shadow:0 0 0 3px var(--go-wash)}
.statuslight.wait{background:var(--wait);box-shadow:0 0 0 3px var(--wait-wash)}
.statuslight.over{background:var(--signal);box-shadow:0 0 0 3px var(--signal-wash)}

.alertrow{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.alertrow:last-child{border-bottom:none}
.alertrow .sev{width:8px;height:8px;border-radius:50%;margin-top:6px;flex:0 0 auto}
.sev-low{background:var(--ink-faint)} .sev-medium{background:var(--wait)} .sev-high{background:var(--signal)}
.alertrow .msg{font-size:.9rem;flex:1}
.alertrow .when{font-size:.74rem;color:var(--ink-faint);font-family:var(--font-mono)}

table.grid{width:100%;border-collapse:collapse;font-size:.92rem}
table.grid th{text-align:left;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);
  font-weight:700;padding:8px 12px;border-bottom:1px solid var(--line)}
table.grid td{padding:10px 12px;border-bottom:1px solid var(--line)}
table.grid tr:hover td{background:var(--surface-2)}
.tag{display:inline-block;font-size:.74rem;font-weight:700;border-radius:999px;padding:2px 9px;font-family:var(--font-mono)}
.tag.exempt{background:var(--console-wash);color:var(--console-ink)}

.empty{text-align:center;color:var(--ink-faint);padding:34px 16px;font-size:.95rem}
.empty .big{font-size:1.9rem;margin-bottom:6px}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:.82rem;font-weight:700;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.field input,.field select,.field textarea{
  border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface);transition:border-color .14s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--console)}
.help{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:50%;background:var(--surface-2);
  color:var(--ink-soft);font-size:.7rem;font-weight:800;cursor:help}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* modal */
.scrim{position:fixed;inset:0;z-index:40;background:rgba(27,35,48,.45);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;padding:20px}
.scrim.show{display:flex}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:min(520px,96vw);
  max-height:90vh;overflow:auto}
.modal-head{padding:18px 22px 6px}
.modal-head h2{font-family:var(--font-display);font-size:1.4rem;font-weight:800;letter-spacing:-.01em}
.modal-head p{color:var(--ink-soft);font-size:.92rem;margin-top:3px}
.modal-body{padding:14px 22px}
.modal-foot{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end}

.signin-list{display:flex;flex-direction:column;gap:8px}
.signin-opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;text-align:left;transition:border-color .14s,background .14s}
.signin-opt:hover{border-color:var(--console);background:var(--console-wash)}
.signin-opt .av{width:38px;height:38px;border-radius:10px;background:var(--console-wash);color:var(--console-ink);
  display:grid;place-items:center;font-weight:800;font-family:var(--font-display)}
.signin-opt .nm{font-weight:700}.signin-opt .rl{font-size:.8rem;color:var(--ink-faint)}
.signin-opt .rl.admin{color:var(--console-ink);font-weight:700}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:600;font-size:.9rem;
  box-shadow:var(--shadow-lg);opacity:0;transition:all .25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}


.mtab{padding:8px 14px;font-weight:600;font-size:.9rem;color:var(--ink-faint);border-bottom:2px solid transparent;margin-bottom:-1.5px;border-radius:0}
.mtab.active{color:var(--console-ink);border-bottom-color:var(--console)}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--surface);border:1.5px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow-lg);max-height:220px;overflow-y:auto;margin-top:2px;display:none}
.ac-list.show{display:block}
.ac-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.active{background:var(--console-wash)}
.ac-item .acn{font-family:var(--font-mono);font-weight:700}
.ac-item .acm{font-size:.8rem;color:var(--ink-faint)}


/* UI helper chatbot */
.help-fab{position:fixed;bottom:22px;right:22px;z-index:55;width:54px;height:54px;border-radius:50%;
  background:var(--console);color:#fff;font-size:1.5rem;box-shadow:var(--shadow-lg);display:grid;place-items:center;
  transition:transform .15s,background .15s}
.help-fab:hover{transform:scale(1.06)}
.help-panel{position:fixed;bottom:88px;right:22px;z-index:55;width:min(380px,calc(100vw - 44px));max-height:min(560px,calc(100vh - 130px));
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);
  display:none;flex-direction:column;overflow:hidden}
.help-panel.show{display:flex}
.help-head{background:var(--console);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
.help-head .ht{font-family:var(--font-display);font-weight:800;font-size:1.05rem}
.help-head .hs{font-size:.78rem;opacity:.85}
.help-head .hclose{margin-left:auto;cursor:pointer;font-size:1.2rem;opacity:.8}
.help-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.help-msg{font-size:.9rem;line-height:1.5;white-space:pre-wrap}
.help-msg.bot{background:var(--surface-2);border-radius:12px 12px 12px 4px;padding:10px 12px;align-self:flex-start;max-width:92%}
.help-msg.user{background:var(--console);color:#fff;border-radius:12px 12px 4px 12px;padding:9px 12px;align-self:flex-end;max-width:88%}
.help-chips{padding:8px 16px 4px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--line)}
.help-chip{font-size:.8rem;border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;color:var(--ink-soft);background:var(--surface)}
.help-chip:hover{border-color:var(--console);color:var(--console)}
.help-input{display:flex;gap:8px;padding:10px 16px 14px;border-top:1px solid var(--line)}
.help-input input{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-size:.88rem}


/* Bulk import upload UI */
.dropzone{border:2.5px dashed var(--line);border-radius:var(--r-lg);padding:32px;text-align:center;
  cursor:pointer;transition:border-color .14s,background .14s}
.dropzone:hover,.dropzone.drag{border-color:var(--console);background:var(--console-wash)}
.dropzone .dz-icon{font-size:2.2rem;margin-bottom:8px}
.dropzone .dz-label{font-weight:600;color:var(--ink-soft)}
.dropzone .dz-sub{font-size:.82rem;color:var(--ink-faint);margin-top:4px}
.parse-preview{margin-top:16px;max-height:260px;overflow-y:auto;border:1px solid var(--line);border-radius:var(--r)}
.parse-preview table{width:100%;border-collapse:collapse;font-size:.88rem}
.parse-preview th{position:sticky;top:0;background:var(--surface-2);padding:7px 10px;text-align:left;
  font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.parse-preview td{padding:7px 10px;border-top:1px solid var(--line)}
.parse-preview tr.row-ok:hover td{background:var(--surface-2)}
.parse-preview tr.row-warn td{background:var(--wait-wash)}
.parse-preview tr.row-err td{background:var(--signal-wash)}
.parse-summary{display:flex;gap:14px;margin-top:10px;font-size:.88rem}
.parse-summary .ps-ok{color:var(--go-ink);font-weight:700}
.parse-summary .ps-warn{color:var(--wait-ink);font-weight:700}
.parse-summary .ps-err{color:var(--signal-ink);font-weight:700}


@media(max-width:680px){
  .console-body{ flex-direction:column; }
  .nav{
    flex:0 0 auto; flex-direction:row; width:100%; border-right:none;
    border-top:1px solid var(--line); padding:6px 8px; gap:2px;
    overflow-x:auto; justify-content:flex-start;
    position:sticky; bottom:0; background:var(--surface); z-index:10;
    order:2; /* push to bottom */
  }
  .nav .navlabel{ display:none; }
  .nav .sep{ display:none; }
  .nav button{
    flex-direction:column; align-items:center; padding:7px 10px;
    font-size:.72rem; min-width:60px; gap:3px; border-radius:10px;
    white-space:nowrap;
  }
  .nav button .ic{ font-size:1.15rem; }
  .view{ order:1; padding:14px 14px 0; overflow:visible; }
  .view-head{ flex-wrap:wrap; gap:8px; }
  .board{ grid-template-columns:1fr; }
  .topbar .who{ display:none; }

/* ==================================================================
   STORE
   ================================================================== */
let store;
function loadStore(){
  try{ const raw=localStorage.getItem(CONFIG.STORE_KEY); if(raw){ store=JSON.parse(raw); return; } }catch(e){}
  store = buildSeed(); saveStore();
}
function saveStore(){ try{ localStorage.setItem(CONFIG.STORE_KEY, JSON.stringify(store)); }catch(e){} }
function resetStore(){ store = buildSeed(); saveStore(); }

if(store && !store.restrictionNotes) store.restrictionNotes=[];
if(store && !store.ruleLayers) store.ruleLayers={};
if(store && store.teacherMessages) store.teacherMessages.forEach(m=>{ if(!m.dismissed_by_json) m.dismissed_by_json="[]"; });
const getSetting = (k)=> store.settings[k] ?? "";
const getLogoDataUrl = ()=> getSetting("school_logo") || "";
// Returns warning string if sn length doesn't match configured or observed length, else ""
function studentIdLengthWarning(sn){
  const configured = parseInt(getSetting("student_id_length")||"0");
  if(configured > 0 && sn.length !== configured)
    return "This ID is "+sn.length+" digits but your school uses "+configured+"-digit IDs. Double-check for typos.";
  // Also check against observed majority length in the database
  const active = store.students.filter(s=>truthy(s.active));
  if(!active.length) return "";
  const lengths = {};
  active.forEach(s=>{ const l=String(s.student_number).length; lengths[l]=(lengths[l]||0)+1; });
  const majority = Object.entries(lengths).sort((a,b)=>b[1]-a[1])[0][0];
  if(String(sn).length !== parseInt(majority))
    return "This ID is "+sn.length+" digits but most students have "+majority+"-digit IDs. Double-check for typos.";
  return "";
}
const setSetting = (k,v)=>{ store.settings[k]=String(v); };

/* ==================================================================
   MOCK BACKEND — mirrors backend/Code.gs pass engine
   ================================================================== */
const Mock = {
  ping(){ return { version:"demo", ok:true }; },

  student_entry(p){
    // device key gate (demo: enforced if a key is set)
    const key = getSetting("device_key");
    if(key && String(p.device_key||"")!==String(key))
      return studentErr("This device is not set up for the student portal. Please ask your teacher.");

    const sn = String(p.student_number||"").trim();
    if(!sn) return ok(sMsg("Please enter your student number.", {result:"need_number"}));

    const student = store.students.find(s=> s.student_number===sn);
    if(!student || !truthy(student.active)){
      logAttempt(sn,"",p.destination,"denied","unknown_or_inactive","",false);
      return ok(sMsg("That student number wasn't recognized. Try again, or ask your teacher if you continue having trouble.", {result:"denied"}));
    }
    const dest = normDest(p.destination);
    const active = store.activePasses.find(a=> a.student_number===sn && a.status==="open");
    if(active) return ok(processReturn(active));

    const d = evaluatePass(student, dest);
    if(d.allowed){
      createActivePass(student, dest);
      logAttempt(sn,student.grade,dest,"allowed","ok","",false);
      if(d.infoAlert) createAlert(d.infoAlert);
      save();
      return ok(sMsg("You are checked out. Please return as soon as you are done.", {result:"checked_out", destination:dest}));
    }
    const alertId = d.alert ? createAlert(d.alert).alert_id : "";
    logAttempt(sn,student.grade,dest,d.result,d.reason_code,alertId,d.override_available);
    save();
    return ok(sMsg("Bathroom pass is not available yet. Please wait approximately "+(d.delay_minutes||5)+" minutes or ask your teacher.", {result:"delayed"}));
  },

  /* teacher/admin — in the demo, "session" stands in for a verified Google token */
  list_active_passes(p,sess){ requireTeacher(sess);
    const rows = store.activePasses.filter(a=>a.status==="open" && scopes(sess,a.grade)).map(a=>({
      pass_id:a.pass_id, student_number:a.student_number, grade:a.grade, classroom_id:a.classroom_id,
      destination:a.destination, check_out_time:a.check_out_time, elapsed_seconds:elapsed(a.check_out_time),
      alert_state:a.alert_state, is_own_classroom:String(a.classroom_id)===String(sess.classroom_id)
    }));
    return ok({active_passes:rows, server_time:nowIso()});
  },
  list_students(p,sess){ requireTeacher(sess);
    return ok({students: store.students.filter(s=>truthy(s.active)&&scopes(sess,s.grade)).map(s=>({
      student_id:s.student_id, student_number:s.student_number, grade:s.grade, classroom_id:s.classroom_id, alert_exempt:truthy(s.alert_exempt), custom_cooldown_minutes:s.custom_cooldown_minutes||""
    }))});
  },
  manual_return(p,sess){ requireTeacher(sess);
    const a = store.activePasses.find(x=>x.pass_id===p.pass_id);
    if(!a) throw E("No open pass found.");
    if(!scopes(sess,a.grade)) throw E("Out of your grade scope.");
    const dur = elapsed(a.check_out_time);
    closePass(a, sess.email, "manual_return");
    audit(sess,"manual_return","Pass",a.pass_id,"Manual return of student "+a.student_number+(p.reason?" ("+p.reason+")":""));
    save(); return ok({ok:true, duration_seconds:dur});
  },
  list_delayed(p,sess){ requireTeacher(sess);
    // recent delayed attempts (last 10 min) for students in scope who are not already out
    const cutoff=Date.now()-10*60000;
    const seen={};
    const rows=store.passAttempts.filter(a=>(a.result==="delayed")&&new Date(a.attempt_time).getTime()>=cutoff&&scopes(sess,a.grade))
      .sort((x,y)=>y.attempt_time.localeCompare(x.attempt_time))
      .filter(a=>{ // dedupe by student, and skip if they are now out or returned since
        if(seen[a.student_number]) return false; seen[a.student_number]=true;
        const out=store.activePasses.find(ap=>ap.student_number===a.student_number&&ap.status==="open");
        return !out;
      })
      .map(a=>{ const al=store.alerts.find(x=>x.alert_id===a.teacher_alert_id);
        return {student_number:a.student_number, grade:a.grade, destination:a.destination||"Bathroom/Water",
          reason_code:a.reason_code, attempt_time:a.attempt_time, alert_id:a.teacher_alert_id||"",
          reason:al?al.message:("Delayed: "+(a.reason_code||"rule")) }; });
    return ok({delayed:rows});
  },

    store.students.push({student_id:uuid(), student_number:sn, grade:String(grade), classroom_id:room,

  remove_student(p,sess){ requireTeacher(sess);
    const sn=String(p.student_number||"").trim();
    const s = store.students.find(x=>x.student_number===sn);
    if(!s) throw E("Student not found.");
    if(!scopes(sess,s.grade)) throw E("Out of your grade scope.");
    let purged=0;
    const drop=(arr,pred)=>{const before=arr.length; const kept=arr.filter(r=>!pred(r)); purged+=before-kept.length; return kept;};
    store.students        = drop(store.students,        r=>r.student_number===sn);
    store.activePasses    = drop(store.activePasses,    r=>r.student_number===sn);
    store.passHistory     = drop(store.passHistory,     r=>r.student_number===sn);
    store.passAttempts    = drop(store.passAttempts,    r=>r.student_number===sn);
    store.pairRestrictions= drop(store.pairRestrictions,r=>r.student_a_number===sn||r.student_b_number===sn);
    store.groupRestrictions=drop(store.groupRestrictions,r=>parseArr(r.student_numbers_json).includes(sn));
    store.alerts          = drop(store.alerts,          r=>r.student_number===sn||r.related_student_number===sn);
    store.teacherNotes    = drop(store.teacherNotes,    r=>r.student_number===sn);
    audit(sess,"student_purged","Student","(redacted)","Student record and all linked data permanently purged. Rows removed: "+purged+".");
    save(); return ok({ok:true, rows_purged:purged});
  },
  bulk_add_students(p,sess){ requireTeacher(sess);
    const list=p.students||[]; if(!list.length) throw E("No rows to import.");
    const existing=new Set(store.students.filter(s=>truthy(s.active)).map(s=>s.student_number));
    let added=0; const skipped=[]; const seen=new Set();
    list.forEach((s,i)=>{
      const sn=String(s.student_number||"").trim(); const grade=s.grade??sess.grade;
      if(!sn){skipped.push({row:i,reason:"missing_number"});return;}
      if(existing.has(sn)||seen.has(sn)){skipped.push({row:i,student_number:sn,reason:"duplicate"});return;}
      if(!scopes(sess,grade)){skipped.push({row:i,student_number:sn,reason:"out_of_scope"});return;}
      seen.add(sn);
      store.students.push({student_id:uuid(), student_number:sn, grade:String(grade),
        classroom_id:s.classroom??s.classroom_id??sess.classroom_id, active:true,
        alert_exempt:truthy(s.alert_exempt), exemption_scope_json:"", created_at:nowIso(), removed_at:""});
      added++;
    });
    audit(sess,"bulk_import","Student","(batch)","Bulk import: "+added+" added, "+skipped.length+" skipped.");
    save(); return ok({added, skipped});
  },

  set_rule(p,sess){ requireTeacher(sess);
    // p: { rule_type, level, grade, classroom_id, value, note }
    const ruleType=p.rule_type, level=p.level;
    if(!["max_concurrent","max_concurrent_grade","cooldown"].includes(ruleType)) throw E("Unknown rule type.");
    // Authorization by level:
    //  school + grade -> admin only;  class -> the classroom's teacher or admin
    if(level==="school"||level==="grade"){ if(!isAdminRole(sess.role)) throw E("Only an administrator can set "+level+"-wide rules."); }
    if(level==="class"){
      if(!isAdminRole(sess.role) && String(sess.classroom_id)!==String(p.classroom_id)) throw E("You can only set rules for your own classroom.");
    }
    // Require a note when a teacher overrides a higher-level rule (class overriding grade/school).
    const grade=p.grade, classroomId=p.classroom_id;
    const before=resolveRule(ruleType, grade, classroomId).winner;
    const overridingHigher = before && LEVEL_RANK[before.level] < LEVEL_RANK[level==="class"?"class":level];
    if(level==="class" && overridingHigher && before.level!=="class" && (before.level==="grade"||before.level==="school")){
      if(!String(p.note||"").trim()) throw E("A note is required when overriding a "+LEVEL_LABEL[before.level]+" rule.");
    }
    const layers=ruleLayersFor(ruleType);
    const key = level==="school"?"school" : level==="grade"?("grade:"+grade) : ("class:"+classroomId);
    const t=store.teachers.find(x=>x.email===sess.email);
    if(String(p.value).trim()===""){ delete layers[key]; } // clearing returns to inherited
    else layers[key]={value:String(p.value), by:sess.email, byName:t?t.display_name:sess.email, level:level, note:String(p.note||""), at:nowIso()};
    // Notify the person whose rule was overridden (if class-level override of someone else's rule)
    if(level==="class" && before && before.by && before.by!==sess.email && before.by!=="system"){
      notifyTeacher(before.by, grade, "restriction_changed", "low",
        (t?t.display_name:sess.email)+" set a classroom "+ruleType.replace(/_/g," ")+" rule that overrides your "+LEVEL_LABEL[before.level]+" setting"+(p.note?'. Note: "'+p.note+'"':"."));
    }
    audit(sess,"rule_set","Rule",ruleType+":"+key, level+" "+ruleType+" = "+p.value+(p.note?" (note: "+p.note+")":""));
    save(); return ok({ok:true});
  },
  get_rules(p,sess){ requireTeacher(sess);
    ensureRuleSeed();
    // Return the resolved rules + chains relevant to this teacher's scope
    const grade=p.grade??sess.grade, classroomId=p.classroom_id??sess.classroom_id;
    const out={};
    ["max_concurrent","max_concurrent_grade","cooldown"].forEach(rt=>{
      out[rt]=resolveRule(rt, grade, classroomId);
    });
    return ok({rules:out, grade, classroom_id:classroomId});
  },
  set_setting(p,sess){ requireAdmin(sess); setSetting(p.key,p.value??""); audit(sess,"setting_changed","Settings",p.key,'Setting "'+p.key+'" updated.'); save(); return ok({ok:true}); },
  list_settings(p,sess){ requireAdmin(sess); return ok({settings:store.settings}); },
  list_audit(p,sess){ requireAdmin(sess); return ok({audit:[...store.auditLog].sort((x,y)=>y.created_at.localeCompare(x.created_at)).slice(0,200)}); }
};

/* ---- engine internals ---- */

/* ============================================================
   RULE HIERARCHY
   Levels (most specific wins): student > classroom > grade > school
   A lower level overrides a higher one. Each layer records who set
   it, at what level, and an optional note — shown on hover.

   store.ruleLayers shape:
   {
     "max_concurrent": {
        "school":        {value, by, byName, note, at},
        "grade:3":       {value, by, byName, note, at},
        "class:3A":      {value, by, byName, note, at}
     },
     "max_concurrent_grade": { "school":{...}, "grade:3":{...} },
     "cooldown": { "school":{...}, "grade:3":{...}, "class:3A":{...} }
   }
   Per-student cooldown still lives on the student record (most specific).
   ============================================================ */
function ruleLayersFor(ruleType){
  if(!store.ruleLayers) store.ruleLayers={};
  if(!store.ruleLayers[ruleType]) store.ruleLayers[ruleType]={};
  return store.ruleLayers[ruleType];
}
// Seed school-level defaults from settings the first time.
function ensureRuleSeed(){
  const ml=ruleLayersFor("max_concurrent");
  if(!ml.school){ const v=getSetting("max_concurrent_classroom");
    ml.school={value:(v===""?"1":v), by:"system", byName:"School default", level:"school", note:"", at:nowIso()}; }
  const gl=ruleLayersFor("max_concurrent_grade");
  if(!gl.school){ const v=getSetting("max_concurrent_grade");
    gl.school={value:(v===""?"":v), by:"system", byName:"School default", level:"school", note:"", at:nowIso()}; }
  const cl=ruleLayersFor("cooldown");
  if(!cl.school){ cl.school={value:getSetting("default_cooldown_minutes")||"10", by:"system", byName:"School default", level:"school", note:"", at:nowIso()}; }
}
// Resolve a rule for a given grade + classroom, returning the winning layer
// plus the full chain (for "you are overriding X" displays).
function resolveRule(ruleType, grade, classroomId){
  ensureRuleSeed();
  const layers=ruleLayersFor(ruleType);
  const chain=[];
  if(layers.school) chain.push({...layers.school, level:"school", key:"school"});
  if(grade!=null && layers["grade:"+grade]) chain.push({...layers["grade:"+grade], level:"grade", key:"grade:"+grade});
  if(classroomId!=null && layers["class:"+classroomId]) chain.push({...layers["class:"+classroomId], level:"class", key:"class:"+classroomId});
  // winner = most specific present (last in chain)
  const winner=chain.length?chain[chain.length-1]:null;
  return {winner, chain};
}
function ruleValue(ruleType, grade, classroomId, fallback){
  const {winner}=resolveRule(ruleType, grade, classroomId);
  if(!winner||winner.value===""||winner.value==null) return fallback;
  return winner.value;
}
const LEVEL_RANK={school:0, grade:1, class:2, student:3};
const LEVEL_LABEL={school:"school-wide", grade:"grade-wide", class:"classroom", student:"student"};

function evaluatePass(student, dest){
  const sn=String(student.student_number), grade=student.grade, isBath=dest==="Bathroom/Water";
  if(isBath){
    // Per-student cooldown overrides class default when set.
  const cdResolved=num(ruleValue("cooldown", grade, student.classroom_id, getSetting("default_cooldown_minutes")||"0"), 0);
  const cdStudent=num(student.custom_cooldown_minutes||"",NaN);
  const cd=!isNaN(cdStudent)?cdStudent:cdResolved;
  if(cd>0){ const last=mostRecentReturn(sn,"Bathroom/Water");
      if(last){ const mins=(Date.now()-last)/60000;
        if(mins<cd){ const rem=Math.ceil(cd-mins);
          return delayed("cooldown",rem,false, A(grade,student.classroom_id,sn,"","cooldown","low",
            "Student "+sn+" attempted a bathroom/water pass during the "+cd+"-minute cooldown. Pass was delayed.")); } } }
  }
  for(const pr of store.pairRestrictions.filter(r=>truthy(r.active)&&!expired(r.expires_at)&&inScope(dest,r.destination_scope)&&(r.student_a_number===sn||r.student_b_number===sn))){
    const partner = pr.student_a_number===sn ? pr.student_b_number : pr.student_a_number;
    const out = store.activePasses.find(a=>a.student_number===partner&&a.status==="open"&&inScope(a.destination,pr.destination_scope));
    if(out){
      const action=String(pr.action_type||"delay").toLowerCase();
      const al=A(grade,student.classroom_id,sn,partner,"pair_restriction","medium",
        "Student "+sn+" attempted to check out while Student "+partner+" was already out. These students have an active pair restriction. "+
        (action==="alert_only"?"Pass was allowed (alert only).":"Pass was delayed pending teacher override."));
      if(action==="alert_only") return {allowed:true, infoAlert:al};
      return delayed("pair_restriction",5,true,al);
    }
  }
  for(const gr of store.groupRestrictions.filter(r=>truthy(r.active)&&inScope(dest,r.destination_scope)&&parseArr(r.student_numbers_json).includes(sn))){
    const members=parseArr(gr.student_numbers_json);
    const out=store.activePasses.find(a=>a.status==="open"&&inScope(a.destination,gr.destination_scope)&&members.includes(a.student_number)&&a.student_number!==sn);
    if(out) return delayed("group_restriction",5,true, A(grade,student.classroom_id,sn,out.student_number,"group_restriction","medium",
      'Student '+sn+' attempted to check out while another member of group "'+gr.group_name+'" (Student '+out.student_number+') was already out. Pass was delayed pending teacher override.'));
  }
  if(isBath){
    const rl=num(ruleValue("max_concurrent", grade, student.classroom_id, "1"), 0);
    const gl=num(ruleValue("max_concurrent_grade", grade, null, ""), 0);
    if(rl>0 && store.activePasses.filter(a=>a.status==="open"&&String(a.classroom_id)===String(student.classroom_id)&&a.destination==="Bathroom/Water").length>=rl)
      return delayed("classroom_capacity",3,true, A(grade,student.classroom_id,sn,"","cooldown","low","Student "+sn+" was delayed: classroom limit ("+rl+" out at a time) reached."));
    if(gl>0 && store.activePasses.filter(a=>a.status==="open"&&String(a.grade)===String(grade)&&a.destination==="Bathroom/Water").length>=gl)
      return delayed("grade_capacity",3,true, A(grade,student.classroom_id,sn,"","cooldown","low","Student "+sn+" was delayed: grade limit ("+gl+" out at a time) reached."));
  }
  return {allowed:true};
}
function delayed(code,mins,override,alert){ return {allowed:false, result:"delayed", reason_code:code, delay_minutes:mins, override_available:!!override, alert}; }
function A(grade,room,sn,rel,type,sev,msg){ return {grade, classroom_id:room, student_number:sn, related_student_number:rel||"", alert_type:type, severity:sev, message:msg}; }
function createActivePass(student,dest){ store.activePasses.push({pass_id:uuid(), student_number:String(student.student_number),
  grade:student.grade, classroom_id:student.classroom_id, teacher_id:classroomTeacherId(student.classroom_id), destination:dest,
  check_out_time:nowIso(), status:"open", alert_state:"none", created_at:nowIso()}); }
function processReturn(a){ const dur=elapsed(a.check_out_time); closePass(a,"student","self_return"); save();
  return sMsg("You are checked back in.", {result:"checked_in", duration_seconds:dur}); }
function closePass(a, closedBy, method){
  store.passHistory.push({pass_id:a.pass_id, student_number:a.student_number, grade:a.grade, classroom_id:a.classroom_id,
    teacher_id:a.teacher_id, destination:a.destination, check_out_time:a.check_out_time, check_in_time:nowIso(),
    duration_seconds:elapsed(a.check_out_time), closed_by:closedBy, closure_method:method, created_at:nowIso()});
  store.activePasses = store.activePasses.filter(x=>x.pass_id!==a.pass_id);
  // Auto-resolve duration/not-returned alerts tied to this now-returned pass.
  store.alerts.forEach(al=>{
    if(al.status==="open" && al.student_number===a.student_number &&
       (al.alert_type==="long_duration"||al.alert_type==="student_not_returned")){
      al.status="auto_resolved"; al.acknowledged_by="system"; al.acknowledged_at=nowIso();
      al.message=al.message+" (Student returned — auto-cleared.)";
    }
  });
}

/* ============================================================
   Alert preferences — per teacher, by category. Avoids fatigue.
   ============================================================ */
const ALERT_CATEGORIES = [
  // yesno:true  = only fires at one severity; on/off is all that matters.
  // yesno:false = fires at multiple severities; the threshold picker is meaningful.
  {key:"student_out_too_long", label:"Student out too long",       yesno:false,
   desc:"Two escalating stages for the same situation — a student who hasn't come back:\n\n• Early warning (medium): trip exceeds the early-warning threshold. The student may still be on their way back.\n• Safety alert (high): student has not been marked back in well past the expected return time. You should check on them.\n\nThresholds are set in Settings → School year & passes.",
   fires:"Medium = trip is running long (early warning). High = student not returned (safety). Set to High only to mute early warnings and keep only the serious alert."},
  {key:"pair_restriction",     label:"Pair restriction triggered", yesno:true,
   desc:"Two students with an active pair restriction tried to be out at the same time. The system already delayed the second student — this alert is so you know it happened.",
   fires:"Always medium severity. On = you see it; Off = you never see it."},
  {key:"group_restriction",    label:"Group restriction triggered",yesno:true,
   desc:"A member of a restricted group tried to check out while another member was already out. Same as pair — system handled it, this is your heads-up.",
   fires:"Always medium severity. On = you see it; Off = you never see it."},
  {key:"cooldown",             label:"Cooldown / capacity delays", yesno:true,
   desc:"A student was delayed because they were in a cooldown window or the class/grade limit was reached. Usually low-stakes; can get frequent in a busy class.",
   fires:"Always low severity. On = you see it; Off = you never see it."},
  {key:"notification",         label:"Changes to your items",      yesno:false,
   desc:"Someone modified or removed a restriction you created, or added a note to a student you've also commented on. Use the threshold to separate: Medium+ shows only restriction changes (not just new notes).",
   fires:"Low = note added by a co-noter. Medium = a restriction you created was removed or changed. High = nothing currently (reserved). Set threshold to Medium+ if you want restriction changes only."},
  {key:"frequency_outlier",    label:"Frequency outliers (analysis only)", yesno:true,
   desc:"Note: this category does NOT generate automatic alerts — outliers are shown in the Insights tab and the Assistant. This toggle is reserved for a future automatic outlier sweep. Leave it on for now.",
   fires:"No automatic alerts currently generated."},
  {key:"coordination",         label:"Coordination patterns (analysis only)", yesno:true,
   desc:"Note: coordination detection is analysis-only (Insights + Assistant). It does not generate automatic real-time alerts. This toggle is reserved for a future automatic check. Leave it on for now.",
   fires:"No automatic alerts currently generated."}
];
// Map an alert's type to a preference category.
function alertCategory(alertType){
  if(alertType==="long_duration") return "student_out_too_long";
  if(alertType==="student_not_returned") return "student_out_too_long";
  if(alertType==="pair_restriction") return "pair_restriction";
  if(alertType==="group_restriction") return "group_restriction";
  if(alertType==="frequency_outlier") return "frequency_outlier";
  if(alertType==="coordination") return "coordination";
  if(alertType==="notification"||alertType==="restriction_changed"||alertType==="note_added") return "notification";
  return "cooldown"; // cooldown, grade/classroom capacity, etc.
}
// A teacher's prefs: { category: {on:bool, minSeverity:"low|medium|high"} }
function getAlertPrefs(teacher){
  let prefs={};
  try{ prefs=JSON.parse(teacher.alert_preferences_json||"{}"); }catch(e){}
  // default: everything on, minSeverity low
  // Migrate old split keys to merged key
  if(prefs.student_not_returned||prefs.long_duration){
    const notRet=prefs.student_not_returned||{on:true,minSeverity:"low"};
    const longDur=prefs.long_duration||{on:true,minSeverity:"low"};
    // If either was off, prefer the more restrictive setting.
    // If not_returned was on but long_duration was off, set threshold to High only.
    if(!prefs.student_out_too_long){
      if(!notRet.on) prefs.student_out_too_long={on:false,minSeverity:"low"};
      else if(!longDur.on) prefs.student_out_too_long={on:true,minSeverity:"high"};
      else prefs.student_out_too_long={on:true,minSeverity:notRet.minSeverity||"low"};
    }
    delete prefs.student_not_returned; delete prefs.long_duration;
  }
  ALERT_CATEGORIES.forEach(c=>{ if(!prefs[c.key]) prefs[c.key]={on:true, minSeverity:"low"}; });
  return prefs;
}
const SEV_RANK={low:0, medium:1, high:2};
// Should this alert show for this teacher given their prefs?
function alertPassesPrefs(alert, teacher){
  const prefs=getAlertPrefs(teacher);
  const cat=alertCategory(alert.alert_type);
  const p=prefs[cat];
  if(!p||!p.on) return false;
  return SEV_RANK[alert.severity||"low"] >= SEV_RANK[p.minSeverity||"low"];
}

function notifyTeacher(targetEmail, grade, alertType, severity, message, relatedSn){
  if(!targetEmail) return;
  store.alerts.push({alert_id:uuid(), grade:grade||"", classroom_id:"", student_number:relatedSn||"",
    related_student_number:"", alert_type:alertType, severity:severity||"low", message:message,
    status:"open", created_at:nowIso(), acknowledged_by:"", acknowledged_at:"", target_email:targetEmail});
}
function createAlert(a){ const row={alert_id:uuid(), grade:a.grade, classroom_id:a.classroom_id, student_number:a.student_number,
  related_student_number:a.related_student_number||"", alert_type:a.alert_type, severity:a.severity||"medium", message:a.message,
  status:"open", created_at:nowIso(), acknowledged_by:"", acknowledged_at:""}; store.alerts.push(row); return row; }
function logAttempt(sn,grade,dest,result,reason,alertId,override){ store.passAttempts.push({attempt_id:uuid(), student_number:sn,
  grade:grade||"", classroom_id:"", destination:dest||"", attempt_time:nowIso(), result, reason_code:reason||"",
  teacher_alert_id:alertId||"", override_available:!!override, created_at:nowIso()}); }
function audit(sess,action,recType,recId,summary){ store.auditLog.push({audit_id:uuid(), actor_email:sess?sess.email:"", actor_role:sess?sess.role:"",
  action_type:action, affected_record_type:recType||"", affected_record_id:recId||"", summary:summary||"", created_at:nowIso()}); }

function mostRecentReturn(sn,dest){ let latest=null; store.passHistory.forEach(r=>{ if(r.student_number===sn&&r.destination===dest){
  const d=new Date(r.check_in_time).getTime(); if(!latest||d>latest) latest=d; }}); return latest; }
function classroomTeacherId(room){ const c=store.classrooms.find(x=>x.classroom_id===room); return c?c.teacher_id:""; }
function normDest(d){ const s=String(d||"").toLowerCase(); if(s==="nurse")return"Nurse"; if(s==="office")return"Office"; return"Bathroom/Water"; }
function inScope(dest,scope){ const sc=String(scope||"").toLowerCase(); if(!sc||sc==="all")return true; return sc.includes(String(dest).toLowerCase()); }
function elapsed(iso){ const d=new Date(iso).getTime(); return isNaN(d)?0:Math.max(0,Math.round((Date.now()-d)/1000)); }
function expired(x){ if(!x)return false; const d=new Date(x).getTime(); return isNaN(d)?false:d<Date.now(); }
function parseArr(s){ try{const a=JSON.parse(s); return Array.isArray(a)?a.map(String):[];}catch(e){return[];} }
function scopes(sess,grade){ if(isAdminRole(sess.role))return true; return String(sess.grade)===String(grade); }
function isAdminRole(r){ r=String(r||"").toLowerCase(); return r==="admin"||r==="administrator"; }
function requireTeacher(sess){ if(!sess) throw E("Teacher sign-in required."); }
function requireAdmin(sess){ requireTeacher(sess); if(!isAdminRole(sess.role)) throw E("Administrator access required."); }
function safeParse(s,f){ try{return JSON.parse(s);}catch(e){return f;} }
const ok=(data)=>({ok:true,data}); const sMsg=(m,x)=>Object.assign({studentMessage:m},x||{});
const studentErr=(m)=>({ok:false, error:"bad_device", message:m, studentMessage:m});
function E(m){ const e=new Error(m); return e; }
function save(){ saveStore(); }

/* ==================================================================
   API LAYER — swap mock <-> live here
   ================================================================== */
async function api(action, params={}){
  const liveUrl = localStorage.getItem(CONFIG.LIVE_URL_KEY);
  if(liveUrl){
    try{
      const body = Object.assign({action}, params);
      if(session && action!=="student_entry" && action!=="ping") body.id_token = session._token || "";
      if(action==="student_entry") body.device_key = getSetting("device_key");
      const res = await fetch(liveUrl, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(body)});
      return await res.json();
    }catch(err){ return {ok:false, error:"network", message:String(err)}; }
  }
  // mock
  try{
    const fn = Mock[action];
    if(!fn) return {ok:false, error:"unknown_action", message:"Unknown action: "+action};
    return fn(params, action==="student_entry"||action==="ping" ? null : session);
  }catch(err){ return {ok:false, error:"error", message:err.message||String(err), studentMessage:err.studentMessage||null}; }
}

function keypad(k){
  const maxLen=kioskMaxLen();
  if(k==="clear")kioskNum="";
  else if(k==="back")kioskNum=kioskNum.slice(0,-1);
  else if(/^[0-9]$/.test(k)&&kioskNum.length<maxLen)kioskNum+=k;
  const v=$("#numval");
  if(v){ v.textContent=kioskNum||idPlaceholder(); v.classList.toggle("placeholder",!kioskNum); }
  // Scanner mode: auto-submit the moment the number reaches expected length.
  // A barcode scanner types all digits + Enter in ~50ms; this fires before Enter arrives,
  // making scans feel instant. Manual typers would need one more keypress to submit.
  if(truthy(getSetting("scanner_mode")) && kioskNum.length===maxLen){
    setTimeout(submitKiosk, 0); // defer so the display updates first
  }
}
async function submitKiosk(){
  // This browser is the provisioned classroom device, so it presents its device key.
  const r = await api("student_entry", {student_number:kioskNum, destination:kioskDest, device_key:getSetting("device_key")});
  const msg = (r.data&&r.data.studentMessage) || r.studentMessage || "Please ask your teacher.";
  const result = (r.data&&r.data.result) || r.result || "denied";
  showResult(msg, result);
  kioskNum=""; const v=$("#numval"); if(v){v.textContent=idPlaceholder(); v.classList.add("placeholder");}
}
/* ============================================================
   Kiosk sound design — Web Audio API, no external files.

   OK    : Two-note ascending marimba-like chime (C5 → E5).
           Warm, quick, clearly positive. Teachers hear "approved"
           from across the room without being startled.

   DENIED: Two-note descending thud (A3 → F3, minor third down).
           Firm, low, obviously "no" — not a scream, not a beep.
           Used for both denied and delayed passes.

   WARN  : Silence. Unknown number should not draw room attention.

   Design choices:
   - Single shared AudioContext (creating one per call causes lag
     and browser warnings after many uses).
   - Compressor on the master bus prevents clipping.
   - Each note uses two detuned oscillators (±4 cents) for warmth
     plus a pitched noise burst at attack for the marimba click.
   - ADSR: 8ms attack, exponential decay to near-zero, no sustain.
     Percussive character, not a held sine tone.
   ============================================================ */
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==="closed"){
    _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  if(_audioCtx.state==="suspended") _audioCtx.resume();
  return _audioCtx;
}

function playKioskTone(type){
  try{
    const ctx=getAudioCtx();
    const now=ctx.currentTime;

    // Master compressor — keeps everything comfortable even at high volume
    const comp=ctx.createDynamicsCompressor();
    comp.threshold.value=-12; comp.knee.value=6;
    comp.ratio.value=3; comp.attack.value=0.003; comp.release.value=0.15;
    comp.connect(ctx.destination);

    // note(freq, startSec, decaySec, vol) — marimba-style percussive note
    function note(freq, startSec, decaySec, vol){
      // Two slightly detuned oscillators for warmth
      [0, 4].forEach(detune=>{
        const o=ctx.createOscillator(); o.type="sine";
        o.frequency.value=freq; o.detune.value=detune;
        const g=ctx.createGain();
        g.gain.setValueAtTime(0, now+startSec);
        g.gain.linearRampToValueAtTime(vol, now+startSec+0.008);  // 8ms attack
        g.gain.exponentialRampToValueAtTime(0.0001, now+startSec+decaySec);
        o.connect(g); g.connect(comp);
        o.start(now+startSec); o.stop(now+startSec+decaySec+0.05);
      });
      // Pitched noise click at attack (gives the marimba "knock")
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.025,ctx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
      const noise=ctx.createBufferSource(); noise.buffer=buf;
      const bandpass=ctx.createBiquadFilter(); bandpass.type="bandpass";
      bandpass.frequency.value=freq*1.5; bandpass.Q.value=2;
      const ng=ctx.createGain(); ng.gain.value=vol*0.18;
      noise.connect(bandpass); bandpass.connect(ng); ng.connect(comp);
      noise.start(now+startSec);
    }

    if(type==="ok"){
      // C5 (523 Hz) then E5 (659 Hz) — ascending major third, upbeat
      note(523.25, 0,    0.55, 0.55);
      note(659.25, 0.19, 0.70, 0.48);
    } else if(type==="denied"){
      // A3 (220 Hz) then F3 (175 Hz) — descending minor third, clearly negative
      // Lower register so it reads as "stop" not "alarm"
      note(220, 0,    0.38, 0.50);
      note(174.61, 0.22, 0.46, 0.44);
    }
    // warn (unknown number) = silence per spec
  }catch(e){ console.warn("Audio error:", e); }
}

function flashKiosk(color){
  const kiosk=document.querySelector(".kiosk");
  if(!kiosk) return;
  const overlay=document.createElement("div");
  overlay.style.cssText="position:absolute;inset:0;z-index:4;pointer-events:none;border-radius:0;opacity:0;transition:opacity .15s";
  overlay.style.background=color==="green"?"rgba(31,138,91,.22)":color==="red"?"rgba(225,85,74,.22)":"rgba(217,138,31,.18)";
  kiosk.style.position="relative"; kiosk.appendChild(overlay);
  requestAnimationFrame(()=>{ overlay.style.opacity="1";
    setTimeout(()=>{ overlay.style.opacity="0"; setTimeout(()=>overlay.remove(),200); },1800); });
}

function showResult(msg, result){
  const wait = (result==="delayed"||result==="denied"||result==="need_number");
  const icon = result==="checked_out"?"🟢":result==="checked_in"?"✅":result==="delayed"?"⏳":"ℹ️";
  const title = result==="checked_out"?"Checked out":result==="checked_in"?"Welcome back":result==="delayed"?"Please wait":"Check again";
  const r=$("#result");
  r.innerHTML = `<div class="result-card ${wait?"wait":""}"><div class="big">${icon}</div><h2>${esc(title)}</h2><p>${esc(msg)}</p></div>`;
  r.classList.add("show");
  // Color flash + sound
  if(result==="checked_out"||result==="checked_in"){ flashKiosk("green"); playKioskTone("ok"); }
  else if(result==="denied"){ flashKiosk("red"); playKioskTone("denied"); }
  else if(result==="delayed"){ flashKiosk("red"); playKioskTone("denied"); }
  else if(result==="need_number"){ flashKiosk("yellow"); /* unknown number: no sound */ }
  clearTimeout(showResult._t);
  showResult._t = setTimeout(()=>r.classList.remove("show"), result==="delayed"?4200:2600);
  r.onclick=()=>r.classList.remove("show");
}

const HELP_SCREEN_INTRO = {

const HELP_CHIPS = {
  board:["What do the colors mean?","How do I end a pass?","What's an override?"],
  alerts:["How do I mute alerts?","Why am I getting so many alerts?","What's an outlier?"],
  students:["How do I set a cooldown?","How do I exempt a student?","How do I remove a student?"],

};

function helpAnswer(q){
  const ql=q.toLowerCase();
  // route to current-screen intro
  if(ql.includes("where am i")||ql.includes("this screen")||ql.includes("what is this")) return HELP_SCREEN_INTRO[route]||"This is the Hall Pass console.";
  // colors
  if(ql.includes("color")||ql.includes("colour")||ql.includes("what do the")) return "On the Out board: green = within normal time, amber = the trip is running long, red = the pass has been open too long (or a student hasn't been marked back in). On the kiosk: green flash + chime = approved, yellow = number not recognized, red + tone = denied.";
  // ending a pass / override
  if(ql.includes("end a pass")||ql.includes("mark in")||ql.includes("mark back")||ql.includes("return")) return "On the Out board, each student's tag has a 'Mark in' button. Click it to check them back in manually — useful when a kiosk return was missed.";
  if(ql.includes("override")||ql.includes("allow")) return "When a student is delayed, they appear in the amber \"Waiting\" panel at the top of the Out board with a one-tap \u2713 Allow button \u2014 the fastest way to let them go. For a student who isn't in that list, use 'Override a pass' and enter their number. Overriding a school or grade rule for your classroom asks for a quick note.";
  // alerts
  if(ql.includes("difference")||(ql.includes("long")&&ql.includes("not return"))||(ql.includes("two")&&ql.includes("alert")&&ql.includes("student"))||ql.includes("early warning")||ql.includes("stage")){
    const lm=getSetting("default_long_duration_minutes")||"6", nr=getSetting("not_returned_minutes")||"15";
    return `"Student out too long" has two stages for the same situation — a student who hasn\'t come back:\n\n• Early warning (amber, medium severity): the trip has passed ${lm} minutes. The student may just be on their way back. It\'s a prompt to keep an eye on the Out board, not necessarily to act.\n\n• Safety alert (red, high severity): the student still hasn\'t been marked back in after ${nr} minutes. At this point you should check on them — the pass is left open and something may be wrong.\n\nBoth resolve automatically the moment the student returns. You can change the thresholds in Settings → School year & passes. In Alert settings, set the threshold to "High only" to mute the early warnings and see only the serious ones.`; }
  if(ql.includes("mute")||ql.includes("too many alert")||ql.includes("fatigue")||ql.includes("turn off alert")) return "Go to Alerts → ⚙ Alert settings. You can turn off any category (long trips, restrictions, outliers, coordination, etc.) and set a minimum severity. This only affects YOUR view — the data is still recorded. It's the best way to cut noise.";
  if(ql.includes("outlier")) return "An outlier is a student whose trip count or trip length is outside the normal range for their class (by default, 2 standard deviations). It's context to review — never proof of anything. Exempt students don't generate these.";
  // students
  if(ql.includes("add a student")||ql.includes("add student")||ql.includes("import")||ql.includes("roster")||ql.includes("pdf")||ql.includes("xlsx")||ql.includes("csv")) return "To add one student, use Students → '+ Add student'. For a whole class, use 'Import roster' — it accepts PDF, CSV, or XLSX files. Everything is parsed in your browser; nothing is uploaded anywhere. The preview shows which rows are ready, which have warnings (still imported), and which will be skipped. You can also paste rows manually in the same dialog (number, grade, room, one per line).";
  if(ql.includes("cooldown")) return "A cooldown is the minimum wait between a student's bathroom/water trips. Set a class-wide one in Students → 'Class rules'. For one student, use Students → Manage → Rules tab, where you can override the class default.";
  if(ql.includes("max out")||ql.includes("how many")||ql.includes("at a time")||ql.includes("at once")) return "The default is 1 student out of a class at a time. Admins can set a different number school-wide or per grade in Settings \u2192 Movement rules, and can also cap how many are out per grade at once. Teachers can override the per-class number for their own room in Students \u2192 Class rules.";
    if(ql.includes("exempt")||ql.includes("accommodation")) return "Marking a student alert-exempt stops frequency/duration alerts for them — useful for approved accommodations. Their trips are still tracked. Toggle it in Students → Manage → Rules, or from their Details panel.";
  if(ql.includes("remove a student")||ql.includes("delete a student")) return "Students → Manage → Remove tab. You'll type the number to confirm. This permanently purges ALL their data — history, alerts, notes, restrictions. It can't be undone.";
  // restrictions
  if((ql.includes("pair")&&ql.includes("group"))||ql.includes("vs group")||ql.includes("difference")) return "A pair restriction is between two specific students who shouldn't be out at the same time. A group restriction means only one member of a named group can be out at a time. Both can delay, require approval, block, or just alert.";
  if(ql.includes("add")&&ql.includes("restriction")) return "Go to Restrictions. Use '+ Pair restriction' for two students or '+ Group' for several. You'll pick an action (delay, approval, block, alert), a reason, and can add a comment. Numbers autocomplete as you type.";
  if((ql.includes("remove")||ql.includes("delete"))&&ql.includes("restriction")) return "Any teacher can remove a restriction. Click 'Remove' on it in the Restrictions tab. You'll be asked for an optional note, and the person who created it gets notified.";
  // insights
  if(ql.includes("percentile")) return "A percentile shows where a student sits versus classmates. 84th percentile for frequency means they go more often than 84% of the class — toward the higher end. Below 50 means they go less than most.";
  if(ql.includes("coordinat")) return "Coordination detection flags pairs of students who repeatedly leave at the same time or within a few minutes of each other. It's in the Insights tab and the Assistant. It's a signal to review, not proof — kids may just share a schedule.";
  if(ql.includes("custom date")||ql.includes("date range")) return "In Insights, click 'Custom' next to the time-window buttons. Two date pickers appear — choose a start and end, and all the stats recalculate for that range.";
  // settings / privacy
  if(ql.includes("device key")) return "The device key is a code the classroom kiosk presents so the student endpoint isn't open to anyone with the link. Set it in Settings before going live. Students never see or type it.";
  if(ql.includes("logo")||ql.includes("mascot")) return "Admins can upload a school logo in Settings → Security & privacy. It shows on the kiosk and in the header.";
  if(ql.includes("go live")||ql.includes("real data")||ql.includes("backend")) return "When your Google Apps Script backend is deployed, paste its /exec URL into Settings → Backend URL and reload. The same app then uses your real Google Sheet instead of demo data.";
  if(ql.includes("privacy")||ql.includes("ferpa")||ql.includes("student data")||ql.includes("safe")) return "The system stores only a student number, grade, and classroom — no names, photos, or medical info. Students see neutral messages and never see restrictions or notes. Removing a student purges all their data. The AI is read-only and (in the live app) sees only aggregate summaries.";
  if(ql.includes("note")) return "You can add notes to a student (Students → Manage → Notes, or their Details panel) and to a restriction (edit it and use the notes thread). Notes are visible to all teachers in your grade — handy for documenting context or parent contact.";
  // fallback
  return (HELP_SCREEN_INTRO[route]||"I can help you find your way around.")+"\n\nTry asking about: adding students, cooldowns, restrictions, alerts, percentiles, or privacy. Or tell me what you're trying to do.";
}

function openAlertPrefs(){
  api("get_alert_prefs").then(res=>{
    const prefs=res.data.prefs;
    // Separate categories: safety-critical first, then decision-support, then analysis-only
    const groups=[
      {label:"Safety & tracking", keys:["student_out_too_long"]},
      {label:"Restrictions",      keys:["pair_restriction","group_restriction"]},
      {label:"Movement flow",     keys:["cooldown"]},
      {label:"Your items",        keys:["notification"]},
      {label:"Analysis only (no real-time alerts)", keys:["frequency_outlier","coordination"]}
    ];
    const sevOpts=(cur)=>["low","medium","high"].map(s=>`<option value="${s}" ${cur===s?"selected":""}>${s==="low"?"Low (all)":s==="medium"?"Medium+ only":"High only"}</option>`).join("");
    const catRow=(c)=>{
      const p=prefs[c.key]||{on:true,minSeverity:"low"};
      const isAnalysis=c.fires&&c.fires.startsWith("No automatic");
      return `<div style="padding:11px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;min-width:0;flex:1">
            <input type="checkbox" data-cat="${c.key}" ${p.on?"checked":""} ${isAnalysis?"":""}style="width:auto;flex-shrink:0"/>
            <span>
              <b style="font-size:.9rem;${isAnalysis?"color:var(--ink-faint)":""}">${esc(c.label)}</b>
              <br><span style="font-size:.78rem;color:var(--ink-faint);line-height:1.4">${esc(c.desc)}</span>
            </span>
          </label>
          ${!c.yesno?`<div style="flex-shrink:0"><div style="font-size:.7rem;color:var(--ink-faint);margin-bottom:3px">Threshold</div>
            <select data-sev="${c.key}" ${p.on?"":"disabled"} style="border:1.5px solid var(--line);border-radius:8px;padding:5px 8px;font-size:.82rem">${sevOpts(p.minSeverity)}</select></div>`
            :`<span style="font-size:.78rem;color:var(--ink-faint);flex-shrink:0;padding-top:2px">${esc(c.fires.split(".")[0])}</span>`}
        </div>
      </div>`;
    };
    // Inject live threshold values into the student_out_too_long description
    const longMin=getSetting("default_long_duration_minutes")||"6";
    const notRetMin=getSetting("not_returned_minutes")||"15";
    const enrichedCats=ALERT_CATEGORIES.map(c=>c.key==="student_out_too_long"?{...c,
      desc:`Two escalating stages:\n• Early warning (medium): trip runs past ${longMin} min — student may still be returning.\n• Safety alert (high): student still out after ${notRetMin} min — you should check on them.\n\nChange these thresholds in Settings → School year & passes.`
    }:c);
    const body=groups.map(g=>`
      <div style="margin-bottom:4px">
        <div style="font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);padding:12px 0 4px">${esc(g.label)}</div>
        ${g.keys.map(k=>{ const c=enrichedCats.find(x=>x.key===k); return c?catRow(c):""; }).join("")}
      </div>`).join("");
    showModal({ title:"Alert settings",
      desc:"Turning a category off hides it from your board only — the data is still recorded. Settings are personal to you.",
      bodyHtml:body,
      footHtml:`<button class="btn ghost" data-close>Cancel</button><button class="btn ghost" id="ap_reset">Reset to defaults</button><button class="btn go" id="ap_save">Save</button>`,
      onMount:(m)=>{
        m.querySelectorAll("[data-cat]").forEach(cb=>cb.onchange=()=>{
          const sev=m.querySelector(`[data-sev="${cb.dataset.cat}"]`); if(sev) sev.disabled=!cb.checked;
        });
        m.querySelector("#ap_reset").onclick=()=>{
          m.querySelectorAll("[data-cat]").forEach(cb=>{ cb.checked=true;
            const sev=m.querySelector(`[data-sev="${cb.dataset.cat}"]`); if(sev){sev.disabled=false;sev.value="low";} });
        };
        m.querySelector("#ap_save").onclick=async()=>{
          const newPrefs={};
          ALERT_CATEGORIES.forEach(c=>{ const cb=m.querySelector(`[data-cat="${c.key}"]`);
            const sev=m.querySelector(`[data-sev="${c.key}"]`);
            newPrefs[c.key]={on:cb?cb.checked:true, minSeverity:sev?sev.value:"low"}; });
          const r=await api("save_alert_prefs",{prefs:newPrefs});
          if(r.ok){ toast("Alert preferences saved"); closeModal(); renderConsole(); } else toast(r.message);
        };
      }});
  });
}

/* ============================================================
   Student number autocomplete — attach to any input.
   As the teacher types, shows matching student numbers in scope.
   ============================================================ */
function studentChoices(){
  return store.students.filter(s=>truthy(s.active)&&scopes(session,s.grade))
    .map(s=>({num:String(s.student_number), grade:s.grade, room:s.classroom_id}))
    .sort((a,b)=>a.num.localeCompare(b.num));
}
function attachAutocomplete(input){
  if(!input) return;
  const wrap=document.createElement("span"); wrap.className="ac-wrap";
  input.parentNode.insertBefore(wrap, input); wrap.appendChild(input);
  const list=document.createElement("div"); list.className="ac-list"; wrap.appendChild(list);
  let active=-1, items=[];
  const choices=studentChoices();
  function render(){
    const q=input.value.trim();
    items = q ? choices.filter(c=>c.num.startsWith(q)).slice(0,30) : choices.slice(0,30);
    if(!items.length || (items.length===1 && items[0].num===q)){ list.classList.remove("show"); return; }
    list.innerHTML=items.map((c,i)=>`<div class="ac-item ${i===active?'active':''}" data-i="${i}">
      <span class="acn">${esc(c.num)}</span><span class="acm">Grade ${esc(c.grade)} · Room ${esc(c.room)}</span></div>`).join("");
    list.classList.add("show");
    list.querySelectorAll(".ac-item").forEach(el=>el.onclick=()=>{ input.value=items[el.dataset.i].num; list.classList.remove("show"); input.dispatchEvent(new Event("input",{bubbles:true})); input.focus(); });
  }
  input.addEventListener("input", ()=>{ active=-1; render(); });
  input.addEventListener("focus", render);
  input.addEventListener("keydown", e=>{
    if(!list.classList.contains("show")) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); active=Math.min(active+1,items.length-1); render(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); active=Math.max(active-1,0); render(); }
    else if(e.key==="Enter"&&active>=0){ e.preventDefault(); input.value=items[active].num; list.classList.remove("show"); input.dispatchEvent(new Event("input",{bubbles:true})); }
    else if(e.key==="Escape"){ list.classList.remove("show"); }
  });
  document.addEventListener("click", e=>{ if(!wrap.contains(e.target)) list.classList.remove("show"); });
}
